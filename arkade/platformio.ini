; ==========================================================================
;  Jogo da Velha — SpotPear ESP32-S3-Touch-LCD-1.54 (ESP32-S3R8, N16R8)
; --------------------------------------------------------------------------
;  Build:    ~/.pio-venv/bin/pio run
;  Upload:   ~/.pio-venv/bin/pio run -t upload
;  Monitor:  ~/.pio-venv/bin/pio device monitor
;
;  Placa: ESP32-S3 com 16MB flash (QIO) + 8MB PSRAM (OPI/octal, sufixo R8).
;  Core instalado: Arduino-ESP32 2.0.17 (IDF 4.4).
; ==========================================================================

[env:spotpear-s3-154]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; --- Memória: 16MB flash + 8MB PSRAM octal (OPI) -------------------------
board_build.arduino.memory_type = qio_opi        ; flash QIO + PSRAM OPI
board_build.flash_mode          = qio
board_upload.flash_size         = 16MB
board_build.flash_size          = 16MB
board_build.partitions          = default_16MB.csv

; --- USB: a USB-C da placa é a USB nativa do S3 (aparece como /dev/ttyACM*)
;     Se o teu upload/monitor sair por /dev/ttyUSB* (chip UART externo),
;     é só remover as duas flags ARDUINO_USB_* abaixo.
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

; --- Bibliotecas ----------------------------------------------------------
;  Arduino_GFX: mesma lib (e versão) que o demo do fabricante usa p/ o ST7789.
;  O touch CST816 é lido por um driver I2C mínimo próprio (src/touch.*),
;  sem dependência externa — mais didático e sem risco de API divergente.
;  OBS: a 1.6.x do Arduino_GFX exige o core 3.x (esp32-hal-periman.h).
;  Como o core instalado é o 2.0.17, fixamos a 1.3.7 (compatível com 2.x).
lib_deps =
    moononournation/GFX Library for Arduino @ 1.3.7
