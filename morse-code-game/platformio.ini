; ==========================================================================
;  Morse Code Game — SpotPear ESP32-S3-Touch-LCD-1.54 (ESP32-S3R8, N16R8)
; --------------------------------------------------------------------------
;  Build:    ~/.pio-venv/bin/pio run
;  Upload:   ~/.pio-venv/bin/pio run -t upload
;  Monitor:  ~/.pio-venv/bin/pio device monitor
;
;  Mesma placa e toolchain do projeto "arkade": ESP32-S3 16MB flash (QIO)
;  + 8MB PSRAM octal (OPI). Core Arduino-ESP32 2.0.17 (IDF 4.4).
; ==========================================================================

[env:spotpear-s3-154]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; --- Memoria: 16MB flash + 8MB PSRAM octal (OPI) -------------------------
board_build.arduino.memory_type = qio_opi        ; flash QIO + PSRAM OPI
board_build.flash_mode          = qio
board_upload.flash_size         = 16MB
board_build.flash_size          = 16MB
board_build.partitions          = default_16MB.csv

; --- USB nativa do S3 (aparece como /dev/ttyACM*) ------------------------
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

; --- Bibliotecas ----------------------------------------------------------
;  Arduino_GFX 1.3.7: ultima versao compativel com o core 2.x (a 1.6.x exige 3.x).
lib_deps =
    moononournation/GFX Library for Arduino @ 1.3.7
